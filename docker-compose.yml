services:
  api:
    build: .
    image: order-risk-engine:latest
    container_name: order-risk-api
    ports:
      - "8000:8000"
    volumes:
      - ./model/artifacts:/app/model/artifacts:ro
    environment:
      MODEL_VERSION: v0.1
    restart: unless-stopped

  dashboard:
    build: .
    image: order-risk-engine:latest
    container_name: order-risk-dashboard
    command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    volumes:
      - ./model/artifacts:/app/model/artifacts:ro
      - ./dashboard:/app/dashboard:ro
    environment:
      MODEL_VERSION: v0.1
    depends_on:
      - api
    restart: unless-stopped
